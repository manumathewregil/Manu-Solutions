<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Manu Solutions</title>
    <link rel="stylesheet" href="css file.css">
    <link rel="stylesheet" href="regform.css">
    <script>
        function Warn(e) {
            e.preventDefault();
            alert("Customer account successfully created! Welcome to Manu Solutions.");
        }
    </script>
</head>
<body>
    <header>
        <h1>Customer Registration</h1>
    </header>

    <nav>
        <ul>
            <li><a href="Home.html">Home</a></li>
            <li><a href="profile.html">About Us</a></li>
            <li><a href="founder.html">Founder</a></li>
            <li class="right-align"><a href="signin.html">Login</a></li>
        </ul>
    </nav>

    <main class="page-main">
        <div class="registration-container flex-col">
            <h2 class="form-heading">Create Your Account</h2>
            <form class="form" onsubmit="Warn(event)" autocomplete="off">
                <div class="grid-layout">
                    <!-- Column 1 -->
                    <div class="form-group">
                        <label>Full Name</label>
                        <input class="input" type="text" placeholder="Enter your full name" required>
                    </div>
                    <div class="form-group">
                        <label>Company / Organization (Optional)</label>
                        <input class="input" type="text" placeholder="Enter company name">
                    </div>
                    
                    <div class="form-group">
                        <label>Email Address</label>
                        <input class="input" type="email" placeholder="Enter primary email" required>
                    </div>
                    <div class="form-group">
                        <label>Contact Number</label>
                        <input class="input" type="tel" placeholder="Enter phone number" required>
                    </div>

                    <div class="form-group">
                        <label>Account Type</label>
                        <div class="radio-group row-group">
                            <label><input type="radio" name="account" value="individual" required> Individual</label>
                            <label><input type="radio" name="account" value="business"> Business/Corporate</label>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label>Date of Birth</label>
                        <input class="input" type="date">
                    </div>
                    
                    <div class="form-group full-width">
                        <label>Primary Interest</label>
                        <select class="input" name="Dropdown" required>
                            <option value="">Select Categories</option>
                            <option value="software">Enterprise Software</option>
                            <option value="hardware">Hardware & IT Supplies</option>
                            <option value="services">Consulting Services</option>
                            <option value="other">Other</option>
                        </select>
                    </div>

                    <div class="form-group full-width">
                        <label>Subscribe to Newsletters</label>
                        <div class="checkbox-group row-group">
                            <label><input type="checkbox" checked> Weekly Deals & Promotions</label>
                            <label><input type="checkbox"> Product Updates</label>
                        </div>
                    </div>

                    <div class="form-group full-width">
                        <label>Default Shipping Address</label>
                        <textarea class="input textarea" rows="4" placeholder="Enter full delivery address" required></textarea>
                    </div>
                </div>
                <div class="form-actions">
                    <button type="submit" class="login-button primary-btn">Create Account</button>
                    <button type="reset" class="login-button secondary-btn">Clear Details</button>
                </div>
            </form>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Manu Solutions. All Rights Reserved</p>
    </footer>
</body>
</html>
